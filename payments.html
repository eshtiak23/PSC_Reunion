<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reunion 2026 - Payment Dashboard">
    <title>Payments | Reunion 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body data-page="payments">

    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
        <div class="loader">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">🎉 Reunion 2026</a>
            <div class="nav-links" id="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="members.html" class="nav-link">Members</a>
                <a href="payments.html" class="nav-link active">Payments</a>
                <a href="gallery.html" class="nav-link">Memories</a>
            </div>
            <button class="nav-toggle" id="navToggle">
                <span></span><span></span><span></span>
            </button>
        </div>
        <div class="mobile-overlay" id="nav-overlay"></div>
    </nav>

    <!-- Page Header -->
    <header class="page-header-new">
        <div class="container">
            <h1>💳 Payment Dashboard</h1>
            <p>Track all reunion contributions</p>
        </div>
    </header>

    <!-- Stats -->
    <section class="stats-section">
        <div class="container">
            <div class="stats-grid-payments">
                <div class="stat-card-home">
                    <span class="stat-icon-home">💰</span>
                    <h3 id="total-collected">৳0</h3>
                    <p class="stat-label-home">Total Collected</p>
                </div>
                <div class="stat-card-home">
                    <span class="stat-icon-home">📊</span>
                    <h3 id="total-count">0</h3>
                    <p class="stat-label-home">Transactions</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Search -->
    <section class="section-home">
        <div class="container">
            <div class="search-box-new">
                <span class="search-icon-new">🔍</span>
                <input type="text" id="payment-search" placeholder="Search by name...">
            </div>
        </div>
    </section>

    <!-- Payments Table -->
    <section class="section-home">
        <div class="container">
            <div class="glass-card-home table-card">
                <div class="table-responsive">
                    <table id="payments-table" class="data-table-new">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Date & Time</th>
                                <th>Amount</th>
                                <th>Method</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td colspan="5" class="loading-cell">Loading payments from Google Sheets...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="footer-text">© 2026 Reunion 2026. Made with ❤️</p>
        </div>
    </footer>

    <!-- Back to Top -->
    <button class="back-to-top" id="backToTop">↑</button>

    <script src="config.js"></script>
    <script src="google-sheet.js"></script>
    <script src="script.js"></script>
</body>
</html>
